let targetQty = 1;

function itemImagePath(name) {
  const exactPng = `${name}.png`;
  const exactWebp = `${name}.webp`;
  const file = IMAGE_FILES.includes(exactPng)
    ? exactPng
    : IMAGE_FILES.includes(exactWebp)
      ? exactWebp
      : IMAGE_ALIASES[name];
  return file ? `images/${file}` : "";
}

function itemVisual(item, className) {
  const src = itemImagePath(item.name);
  if (src) return `<img class="${className} item-img" src="${src}" alt="${item.name}" loading="lazy">`;
  return `<span class="${className}">${item.icon || ""}</span>`;
}

function toolVisual(tool, className = "tool-icon") {
  const src = TOOL_IMAGES[tool];
  if (src) return `<img class="${className} tool-img" src="${src}" alt="${tool}" loading="lazy">`;
  return `<span class="${className}">${TOOL[tool]?.icon || ""}</span>`;
}

function toolClass(tool) {
  return {
    "냄비": "tool-pot",
    "도마": "tool-board",
    "프라이팬": "tool-pan",
    "화로": "tool-furnace",
    "제작대": "tool-crafting",
  }[tool] || "tool-crafting";
}

function setToolTheme(tool) {
  document.body.classList.remove("tool-pot", "tool-board", "tool-pan", "tool-furnace", "tool-crafting");
  document.body.classList.add(toolClass(tool));
}

function toolAmbience(tool) {
  const labels = {
    "냄비": ["steam", "steam", "bubble", "steam", "bubble", "steam"],
    "도마": ["leaf", "cut", "leaf", "cut", "leaf", "grain"],
    "프라이팬": ["sizzle", "oil", "sizzle", "oil", "spark", "sizzle"],
    "화로": ["ember", "flame", "smoke", "ember", "flame", "spark"],
    "제작대": ["chip", "saw", "chip", "grid", "chip", "saw"],
  }[tool] || ["chip", "grid", "chip"];
  return `<div class="tool-ambience" aria-hidden="true">
    ${labels.map((name, index) => `<span class="fx fx-${name}" style="--i:${index}; --x:${10 + index * 15}%; --drift:${(index - 2) * 12}px"></span>`).join("")}
  </div>`;
}

function findSubRecipe(name) {
  return RECIPES.find(r => (r.category === "sub1" || r.category === "sub2") && r.result.name === name);
}

function pickByName(name) {
  const r = findSubRecipe(name);
  if (r) pick(r.id);
}

function collect(r) {
  const map = {};
  function add(item, qty, bowl) {
    if (!map[item.name]) map[item.name] = { ...item, base: 0, bowl: !!bowl };
    map[item.name].base += qty;
  }
  if (r.slots) Object.values(r.slots).forEach(s => add(s, s.qty));
  if (r.input) add(r.input, r.input.qty);
  if (r.bowl) add(r.bowl, 1, true);
  return Object.values(map);
}

function slotOrder(tool) {
  return tool === "냄비" ? [[1,2,3],[4,5,6]] : [[1,2,3],[4,5,6],[7,8,9]];
}

function renderSidebar() {
  ["main", "sub1", "sub2"].forEach(cat => {
    const el = document.getElementById(cat + "-list");
    if (!el) return;
    el.innerHTML = RECIPES
      .filter(r => r.category === cat)
      .map(r => `<button class="recipe-btn${r.hidden ? ' hidden-recipe-btn' : ''}" data-cat="${cat}" id="btn-${r.id}" onclick="pick('${r.id}')">${r.hidden ? '&#x1F512; ' : ''}${r.name}</button>`)
      .join("");
  });
}

function pick(id) {
  activeId = id;
  targetQty = 1;
  expandedSet.clear();
  const recipe = RECIPES.find(r => r.id === id);
  if (recipe) setToolTheme(recipe.tool);
  document.querySelectorAll(".recipe-btn").forEach(b => b.classList.remove("active"));
  const btn = document.getElementById("btn-" + id);
  if (btn) btn.classList.add("active");
  renderMain();
}

function changeQty(d) {
  targetQty = Math.max(1, targetQty + d);
  const el = document.getElementById("qty-num");
  if (el) el.value = targetQty;
  refreshTotals();
}

function onQtyChange(e) {
  targetQty = Math.max(1, parseInt(e.target.value) || 1);
  e.target.value = targetQty;
  refreshTotals();
}

function toggleSub(event, ingName) {
  event.stopPropagation();
  if (expandedSet.has(ingName)) expandedSet.delete(ingName);
  else expandedSet.add(ingName);
  refreshTotals();
}

function animateTotalCards() {
  document.querySelectorAll(".total-card").forEach((card, index) => {
    card.style.animationDelay = `${index * 0.06}s`;
    card.classList.add("visible");
  });
}

function countUpTotal(el, target, duration = 420) {
  const start = performance.now();
  function tick(now) {
    const progress = Math.min((now - start) / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    el.textContent = `${Math.round(target * eased)}개`;
    if (progress < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function refreshTotals() {
  const r = RECIPES.find(x => x.id === activeId);
  if (!r || r.hidden) return;
  const metaEl = document.getElementById("totals-meta");
  const gridEl = document.getElementById("totals-grid");
  if (!metaEl || !gridEl) return;

  const crafts = Math.ceil(targetQty / r.result.qty);
  const actual = crafts * r.result.qty;
  metaEl.innerHTML = `목표 <span class="hi">${targetQty}개</span> → ${crafts}회 제작 · 실제 생산 <span class="hi">${actual}개</span>`;

  gridEl.innerHTML = collect(r).map(ing => {
    const total = ing.base * crafts;
    const subR = findSubRecipe(ing.name);
    const expanded = expandedSet.has(ing.name);
    const safeName = ing.name.replace(/\\/g, "\\\\").replace(/'/g, "\\'");
    const expandBtn = subR
      ? `<button class="expand-btn${expanded ? " open" : ""}" onclick="toggleSub(event,'${safeName}')" title="재료 과정 보기">${expanded ? "−" : "+"}</button>`
      : "";

    let subPanelHtml = "";
    if (subR && expanded) {
      const subCrafts = Math.ceil(total / subR.result.qty);
      const ti = TOOL[subR.tool];
      subPanelHtml = `
        <div class="sub-panel">
          <div class="sp-title">${toolVisual(subR.tool)} ${subR.tool} &nbsp;${subCrafts}회 제작 기준</div>
          <div class="sp-rows">
            ${collect(subR).map(si => `
              <div class="sp-row">
                ${itemVisual(si, "sp-icon")}
                <span class="sp-name">${si.name}</span>
                <span class="sp-qty">${si.base * subCrafts}개</span>
              </div>`).join("")}
          </div>
        </div>`;
    }

    return `
      <div class="total-card${ing.bowl ? " bowl-card" : ""}">
        <div class="card-top">
          ${itemVisual(ing, "tc-icon")}
          <div class="tc-info">
            <span class="tc-name">${ing.name}</span>
            <span class="tc-formula">${ing.base}개 × ${crafts}회</span>
            <span class="tc-total" data-total="${total}">${total}개</span>
          </div>
          ${expandBtn}
        </div>
        ${subPanelHtml}
      </div>`;
  }).join("");

  requestAnimationFrame(() => {
    animateTotalCards();
    document.querySelectorAll(".tc-total").forEach(el => {
      const total = parseInt(el.dataset.total || el.textContent, 10);
      if (!Number.isNaN(total)) countUpTotal(el, total);
    });
  });
}

function hiddenGridSection(r) {
  const ti = TOOL[r.tool];
  const order = slotOrder(r.tool);
  const slotsHtml = order.map(row =>
    row.map(n => `<div class="slot hidden-slot">
      <span class="slot-num">${n}</span>
      <span class="item-icon">?</span>
      <span class="item-name">???</span>
    </div>`).join("")
  ).join("");
  const bowlHtml = r.bowl ? `
    <div class="bowl-area">
      <div class="bowl-divider"></div>
      <div class="bowl-label">&#x1F4E5; 추가 재료</div>
      <div class="slot bowl filled" data-tip="${r.bowl.name}">
        ${itemVisual(r.bowl, "item-icon")}
        <span class="item-name">${r.bowl.name}</span>
      </div>
    </div>` : "";

  return `
    <div class="craft-area">
      <div class="grid-wrap">
        <div class="grid-label">${toolVisual(r.tool)} ${r.tool}</div>
        <div class="grid-3x2">${slotsHtml}</div>
        ${bowlHtml}
      </div>
      <div class="craft-arrow">&#x27A1;</div>
      <div class="result-area">
        <div class="result-slot">
          ${itemVisual(r.result, "r-icon")}
          <span class="r-name">${r.result.name}</span>
        </div>
      </div>
    </div>
    <div class="hidden-notice">
      <div class="hidden-notice-icon">&#x1F50D;</div>
      <div class="hidden-notice-text">
        <strong>숨겨진 레시피</strong>
        <p>이 레시피는 아직 공개되지 않았습니다.<br>확인되는 대로 업데이트하겠습니다.</p>
      </div>
    </div>`;
}

function gridSection(r) {
  if (r.hidden) return hiddenGridSection(r);
  const ti = TOOL[r.tool];
  const order = slotOrder(r.tool);
  const gcls = r.tool === "냄비" ? "grid-3x2" : "grid-3x3";
  const slotsHtml = order.map(row =>
    row.map(n => {
      const s = r.slots[n];
      if (!s) return `<div class="slot"><span class="slot-num">${n}</span></div>`;
      const sub = findSubRecipe(s.name);
      return `<div class="slot filled${sub ? ' slot-link' : ''}" data-tip="${s.name}"${sub ? ` onclick="pickByName('${s.name}')"` : ''}>
        ${sub ? '<span class="slot-link-badge">↗</span>' : ''}
        <span class="slot-num">${n}</span>
        ${itemVisual(s, "item-icon")}
        <span class="item-name">${s.name}</span>
      </div>`;
    }).join("")
  ).join("");
  const bowlHtml = r.bowl ? `
    <div class="bowl-area">
      <div class="bowl-divider"></div>
      <div class="bowl-label">&#x1F4E5; 추가 재료</div>
      <div class="slot bowl filled" data-tip="${r.bowl.name}">
        ${itemVisual(r.bowl, "item-icon")}
        <span class="item-name">${r.bowl.name}</span>
      </div>
    </div>` : "";

  return `
    <div class="craft-area">
      <div class="grid-wrap">
        <div class="grid-label">${toolVisual(r.tool)} ${r.tool}</div>
        <div class="${gcls}">${slotsHtml}</div>
        ${bowlHtml}
      </div>
      <div class="craft-arrow">&#x27A1;</div>
      <div class="result-area">
        <div class="result-slot">
          ${itemVisual(r.result, "r-icon")}
          <span class="r-name">${r.result.name}</span>
        </div>
        ${qtyControl()}
      </div>
    </div>`;
}

function simpleSection(r) {
  const ti = TOOL[r.tool];
  const subInput = findSubRecipe(r.input.name);
  return `
    <div class="simple-area">
      <div class="big-slot${subInput ? ' slot-link' : ''}"${subInput ? ` onclick="pickByName('${r.input.name}')"` : ''}>
        ${subInput ? '<span class="slot-link-badge">↗</span>' : ''}
        ${itemVisual(r.input, "b-icon")}
        <span class="b-name">${r.input.name}</span>
      </div>
      <div class="craft-arrow">&#x27A1;</div>
      <div class="tool-mid" title="${r.tool}">${toolVisual(r.tool, "tool-mid-icon")}</div>
      <div class="craft-arrow">&#x27A1;</div>
      <div class="simple-right">
        <div class="big-result">
          ${itemVisual(r.result, "b-icon")}
          <span class="b-name">${r.result.name}</span>
          <span class="b-per">× ${r.result.qty} / 1회</span>
        </div>
        ${qtyControl()}
      </div>
    </div>`;
}

function qtyControl() {
  return `
    <div class="qty-wrap">
      <div class="qty-label">목표 수량</div>
      <div class="qty-control">
        <button class="qty-btn" onclick="changeQty(-1)">&#x2212;</button>
        <input id="qty-num" class="qty-num" type="number" value="${targetQty}" min="1" oninput="onQtyChange(event)">
        <button class="qty-btn" onclick="changeQty(1)">&#x2B;</button>
      </div>
    </div>`;
}

function renderMain() {
  const r = RECIPES.find(x => x.id === activeId);
  if (!r) return;
  const ti = TOOL[r.tool];

  document.getElementById("main-content").innerHTML = `
    ${toolAmbience(r.tool)}
    <div class="recipe-header">
      <span class="recipe-title">${itemVisual(r.result, "title-icon")}&nbsp;${r.name}</span>
      <div class="recipe-header-badges">
        ${r.hidden ? '<span class="hidden-badge">&#x1F512; 숨겨진 레시피</span>' : ''}
        <span class="tool-badge">${toolVisual(r.tool)} ${r.tool}</span>
      </div>
    </div>
    ${ti.simple ? simpleSection(r) : gridSection(r)}
    ${r.hidden ? '' : `
    <div class="section-divider"></div>
    <div class="totals-section">
      <div class="totals-header">
        <h3>&#x1F4E6; 필요 재료 총량</h3>
        <div class="totals-meta" id="totals-meta"></div>
      </div>
      <div class="totals-grid" id="totals-grid"></div>
    </div>`}
  `;

  if (!r.hidden) refreshTotals();
}

function setupNotice() {
  const overlay = document.getElementById("notice-overlay");
  const close = document.getElementById("notice-close");
  if (!overlay || !close) return;
  requestAnimationFrame(() => overlay.classList.add("visible"));
  close.addEventListener("click", () => overlay.classList.remove("visible"));
}

function setupBgm() {
  const audio = document.getElementById("bgm-audio");
  const toggle = document.getElementById("bgm-toggle");
  const label = document.getElementById("bgm-label");
  if (!audio || !toggle || !label) return;

  function setPlaying(isPlaying) {
    toggle.setAttribute("aria-pressed", String(isPlaying));
    toggle.classList.toggle("playing", isPlaying);
    label.textContent = isPlaying ? "BGM 켜짐" : "BGM 켜기";
  }

  async function play() {
    try {
      await audio.play();
      setPlaying(true);
    } catch {
      setPlaying(false);
    }
  }

  toggle.addEventListener("click", () => {
    if (audio.paused) play();
    else {
      audio.pause();
      setPlaying(false);
    }
  });
  document.addEventListener("pointerdown", () => {
    if (audio.paused) play();
  }, { once:true });
  setPlaying(false);
}

function setupHeaderStars() {
  const c = document.getElementById("header-stars");
  if (!c) return;
  for (let i = 0; i < 28; i++) {
    const s = document.createElement("div");
    s.className = "header-star";
    s.style.left = Math.random() * 100 + "%";
    s.style.top = Math.random() * 100 + "%";
    s.style.animationDelay = Math.random() * 2 + "s";
    c.appendChild(s);
  }
}

renderSidebar();
setupNotice();
setupBgm();
setupHeaderStars();
pick("hamburger");
</script>
</body>
</html>
