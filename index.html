function itemImagePath(name) {
  const exactPng = `${name}.png`;
  const exactWebp = `${name}.webp`;
  const file = IMAGE_FILES.includes(exactPng)
    ? exactPng
    : IMAGE_FILES.includes(exactWebp)
      ? exactWebp
      : IMAGE_ALIASES[name];
  return file ? `images/${file}` : "";
}

function itemVisual(item, className) {
  const src = itemImagePath(item.name);
  if (src) return `<img class="${className} item-img" src="${src}" alt="${item.name}" loading="lazy">`;
  return `<span class="${className}">${item.icon || ""}</span>`;
}

function toolVisual(tool, className = "tool-icon") {
  const src = TOOL_IMAGES[tool];
  if (src) return `<img class="${className} tool-img" src="${src}" alt="${tool}" loading="lazy">`;
  return `<span class="${className}">${TOOL[tool]?.icon || ""}</span>`;
}

function toolClass(tool) {
  return {
    "냄비": "tool-pot",
    "도마": "tool-board",
    "프라이팬": "tool-pan",
    "화로": "tool-furnace",
    "제작대": "tool-crafting",
  }[tool] || "tool-crafting";
}

function setToolTheme(tool) {
  document.body.classList.remove("tool-pot", "tool-board", "tool-pan", "tool-furnace", "tool-crafting");
  document.body.classList.add(toolClass(tool));
}

function toolAmbience(tool) {
  const labels = {
    "냄비": ["steam", "steam", "bubble", "steam", "bubble", "steam"],
    "도마": ["leaf", "cut", "leaf", "cut", "leaf", "grain"],
    "프라이팬": ["sizzle", "oil", "sizzle", "oil", "spark", "sizzle"],
    "화로": ["ember", "flame", "smoke", "ember", "flame", "spark"],
    "제작대": ["chip", "saw", "chip", "grid", "chip", "saw"],
  }[tool] || ["chip", "grid", "chip"];
  return `<div class="tool-ambience" aria-hidden="true">
    ${labels.map((name, index) => `<span class="fx fx-${name}" style="--i:${index}; --x:${10 + index * 15}%; --drift:${(index - 2) * 12}px"></span>`).join("")}
  </div>`;
}

function findSubRecipe(name) {
  return RECIPES.find(r => (r.category === "sub1" || r.category === "sub2") && r.result.name === name);
}

function pickByName(name) {
  const r = findSubRecipe(name);
  if (r) pick(r.id);
}

function collect(r) {
  const map = {};
  function add(item, qty, bowl) {
    if (!map[item.name]) map[item.name] = { ...item, base: 0, bowl: !!bowl };
    map[item.name].base += qty;
  }
  if (r.slots) Object.values(r.slots).forEach(s => add(s, s.qty));
  if (r.input) add(r.input, r.input.qty);
  if (r.bowl) add(r.bowl, 1, true);
  return Object.values(map);
}

function addMapped(map, item, qty, bowl) {
  if (!map[item.name]) map[item.name] = { ...item, base: 0, bowl: !!bowl };
  map[item.name].base += qty;
  if (bowl) map[item.name].bowl = true;
}

function collectRawFromItem(item, neededQty, map, trail = []) {
  const subR = findSubRecipe(item.name);
  if (!subR || item.bowl || trail.includes(item.name)) {
    addMapped(map, item, neededQty, item.bowl);
    return;
  }

  const crafts = Math.ceil(neededQty / subR.result.qty);
  collect(subR).forEach(child => {
    collectRawFromItem(child, child.base * crafts, map, [...trail, item.name]);
  });
}

function collectRawTotals(r, crafts) {
  const map = {};
  collect(r).forEach(ing => collectRawFromItem(ing, ing.base * crafts, map));
  return Object.values(map);
}

function slotOrder(tool) {
  return tool === "냄비" ? [[1,2,3],[4,5,6]] : [[1,2,3],[4,5,6],[7,8,9]];
}

function renderSidebar() {
  ["main", "sub1", "sub2"].forEach(cat => {
    const el = document.getElementById(cat + "-list");
    if (!el) return;
    el.innerHTML = RECIPES
      .filter(r => r.category === cat)
      .map(r => `<button class="recipe-btn${r.hidden ? ' hidden-recipe-btn' : ''}" data-cat="${cat}" id="btn-${r.id}" onclick="pick('${r.id}')">${r.hidden ? '&#x1F512; ' : ''}${r.name}</button>`)
      .join("");
  });
}

function pick(id) {
  activeId = id;
  targetQty = 1;
  expandedSet.clear();
  ingredientPrices = {};
  const recipe = RECIPES.find(r => r.id === id);
  if (recipe) setToolTheme(recipe.tool);
  document.querySelectorAll(".recipe-btn").forEach(b => b.classList.remove("active"));
  const btn = document.getElementById("btn-" + id);
  if (btn) btn.classList.add("active");
  renderMain();
}

function changeQty(d) {
  targetQty = Math.max(1, targetQty + d);
  const el = document.getElementById("qty-num");
  if (el) el.value = targetQty;
  refreshTotals();
}

function onQtyChange(e) {
  targetQty = Math.max(1, parseInt(e.target.value) || 1);
  e.target.value = targetQty;
  refreshTotals();
}

function toggleSub(event, ingName) {
  event.stopPropagation();
  if (expandedSet.has(ingName)) expandedSet.delete(ingName);
  else expandedSet.add(ingName);
  refreshTotals();
}

function animateTotalCards() {
  document.querySelectorAll(".total-card").forEach((card, index) => {
    card.style.animationDelay = `${index * 0.06}s`;
    card.classList.add("visible");
  });
}

function countUpTotal(el, target, duration = 420) {
  const start = performance.now();
  function tick(now) {
    const progress = Math.min((now - start) / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    el.textContent = `${Math.round(target * eased)}개`;
    if (progress < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function priceKey(name) {
  return name.replace(/\s+/g, "_").replace(/[^\w가-힣-]/g, "");
}

function formatKani(value) {
  return Math.round(value).toLocaleString("ko-KR");
}

function kaniMarkup(value) {
  return `<span class="kani-amount">${formatKani(value)}</span><span class="kani-unit">카니</span>`;
}

function updatePriceSummary() {
  const rows = document.querySelectorAll(".price-row");
  const totalEl = document.getElementById("price-total-value");
  const perEl = document.getElementById("price-per-value");
  const hintEl = document.getElementById("price-hint");
  if (!totalEl || !perEl || !hintEl) return;

  let totalCost = 0;
  let hasPrice = false;

  rows.forEach(row => {
    const qty = Number(row.dataset.qty || 0);
    const input = row.querySelector(".price-input");
    const lineEl = row.querySelector(".price-line-total");
    const price = Number(input?.value || 0);
    const lineTotal = qty * price;

    if (price > 0) hasPrice = true;
    if (lineEl) lineEl.innerHTML = price > 0 ? kaniMarkup(lineTotal) : "-";
    totalCost += lineTotal;
  });

  totalEl.innerHTML = hasPrice ? kaniMarkup(totalCost) : "-";
  perEl.innerHTML = hasPrice ? `<span class="price-per-prefix">개당 약</span> ${kaniMarkup(totalCost / Math.max(targetQty, 1))}` : "단가를 입력하면 계산됩니다";
  hintEl.textContent = hasPrice ? "입력한 원재료 단가 기준의 대략적인 재료값입니다." : "필요한 원재료의 개당 가격을 입력해보세요.";
}

function onIngredientPriceInput(event, key) {
  const value = event.target.value;
  if (value === "") delete ingredientPrices[key];
  else ingredientPrices[key] = value;
  updatePriceSummary();
}

function refreshTotals() {
  const r = RECIPES.find(x => x.id === activeId);
  if (!r || r.hidden) return;
  const metaEl = document.getElementById("totals-meta");
  const gridEl = document.getElementById("totals-grid");
  const rawGridEl = document.getElementById("raw-totals-grid");
  if (!metaEl || !gridEl || !rawGridEl) return;

  const crafts = Math.ceil(targetQty / r.result.qty);
  const actual = crafts * r.result.qty;
  metaEl.innerHTML = `목표 <span class="hi">${targetQty}개</span> → ${crafts}회 제작 · 실제 생산 <span class="hi">${actual}개</span>`;

  gridEl.innerHTML = collect(r).map(ing => {
    const total = ing.base * crafts;
    const subR = findSubRecipe(ing.name);
    const expanded = expandedSet.has(ing.name);
    const safeName = ing.name.replace(/\\/g, "\\\\").replace(/'/g, "\\'");
    const expandBtn = subR
      ? `<button class="expand-btn${expanded ? " open" : ""}" onclick="toggleSub(event,'${safeName}')" title="재료 과정 보기">${expanded ? "−" : "+"}</button>`
      : "";

    let subPanelHtml = "";
    if (subR && expanded) {
      const subCrafts = Math.ceil(total / subR.result.qty);
      const ti = TOOL[subR.tool];
      subPanelHtml = `
        <div class="sub-panel">
          <div class="sp-title">${toolVisual(subR.tool)} ${subR.tool} &nbsp;${subCrafts}회 제작 기준</div>
          <div class="sp-rows">
            ${collect(subR).map(si => `
              <div class="sp-row">
                ${itemVisual(si, "sp-icon")}
                <span class="sp-name">${si.name}</span>
                <span class="sp-qty">${si.base * subCrafts}개</span>
              </div>`).join("")}
          </div>
        </div>`;
    }

    return `
      <div class="total-card${ing.bowl ? " bowl-card" : ""}">
        <div class="card-top">
          ${itemVisual(ing, "tc-icon")}
          <div class="tc-info">
            <span class="tc-name">${ing.name}</span>
            <span class="tc-formula">${ing.base}개 × ${crafts}회</span>
            <span class="tc-total" data-total="${total}">${total}개</span>
          </div>
          ${expandBtn}
        </div>
        ${subPanelHtml}
      </div>`;
  }).join("");

  rawGridEl.innerHTML = collectRawTotals(r, crafts).map(ing => {
    const total = ing.base;
    const key = priceKey(ing.name);
    const value = ingredientPrices[key] || "";
    return `
      <div class="total-card raw-card${ing.bowl ? " bowl-card" : ""}">
        <div class="card-top">
          ${itemVisual(ing, "tc-icon")}
          <div class="tc-info">
            <span class="tc-name">${ing.name}</span>
            <span class="tc-formula">하위 레시피까지 합산</span>
            <span class="tc-total" data-total="${total}">${total}개</span>
          </div>
        </div>
        <div class="price-row" data-qty="${total}">
          <label class="price-label" for="price-${key}">개당 가격</label>
          <div class="price-input-wrap">
            <input id="price-${key}" class="price-input" type="number" min="0" inputmode="numeric" placeholder="0" value="${value}" oninput="onIngredientPriceInput(event, '${key}')">
            <span class="price-unit">카니</span>
          </div>
          <strong class="price-line-total">-</strong>
        </div>
      </div>`;
  }).join("");

  document.getElementById("price-summary")?.remove();
  rawGridEl.insertAdjacentHTML("afterend", `
    <div class="price-summary" id="price-summary">
      <div>
        <span class="price-summary-label">총 재료값</span>
        <strong id="price-total-value">-</strong>
      </div>
      <div>
        <span class="price-summary-label">목표 수량 기준</span>
        <strong id="price-per-value">단가를 입력하면 계산됩니다</strong>
      </div>
      <p id="price-hint">필요한 원재료의 개당 가격을 입력해보세요.</p>
    </div>
  `);

  requestAnimationFrame(() => {
    animateTotalCards();
    document.querySelectorAll(".tc-total").forEach(el => {
      const total = parseInt(el.dataset.total || el.textContent, 10);
      if (!Number.isNaN(total)) countUpTotal(el, total);
    });
    updatePriceSummary();
  });
}

function setupNotice() {

}

function setupBgm() {
  const audio = document.getElementById("bgm-audio");
  const toggle = document.getElementById("bgm-toggle");
  const label = document.getElementById("bgm-label");
  if (!audio || !toggle || !label) return;

  function setPlaying(isPlaying) {
    toggle.setAttribute("aria-pressed", String(isPlaying));
    toggle.classList.toggle("is-playing", isPlaying);
    toggle.classList.remove("is-blocked");
    label.textContent = isPlaying ? "BGM 켜짐" : "BGM 켜기";
  }

  async function play() {
    try {
      await audio.play();
      setPlaying(true);
    } catch {
      setPlaying(false);
      toggle.classList.add("is-blocked");
    }
  }

  toggle.addEventListener("click", () => {
    if (audio.paused) play();
    else {
      audio.pause();
      setPlaying(false);
    }
  });
  document.addEventListener("pointerdown", () => {
    if (audio.paused) play();
  }, { once:true });
  setPlaying(false);
}

function setupHeaderStars() {

    var sec = MARKET_PRICES.sections[si];
    var acc = colAccMap[sec.color] || colAccMap.blue;
    h += '<div class="mc3-section">';
    h += '<div class="mc3-sec-hd" style="border-left-color:' + acc + '">';
    h += '<span class="mc3-sec-icon">' + sec.icon + '</span>';
    h += '<span class="mc3-sec-title">' + sec.label + '</span>';
    h += '<span class="mc3-sec-cnt">' + sec.items.length + '종</span>';
    h += '</div>';
    h += '<div class="mc3-cards">';
    for (var ii = 0; ii < sec.items.length; ii++) {
      h += buildMarketCard(sec.items[ii], sec);
    }
    h += '</div>';
    h += '</div>';
  }
  h += '</div></div>';

  view.innerHTML = h;

  // ── 계산기 이벤트: 구매 수량 + 총 구매금액 ──
  view.querySelectorAll(".mc3-card").forEach(function(card) {
    var unitPrice  = parseFloat(card.dataset.unitPrice);  // 서버 개당가
    var qtyInput   = card.querySelector('[id^="qty-"]');
    var priceInput = card.querySelector('[id^="price-"]');
    var resultEl   = card.querySelector('[id^="res-"]');
    if (!qtyInput || !priceInput || !resultEl) return;

    function calc() {
      var myQty   = parseFloat(qtyInput.value);
      var myTotal = parseFloat(priceInput.value);

      if (!qtyInput.value || !priceInput.value || isNaN(myQty) || isNaN(myTotal) || myQty <= 0 || myTotal < 0) {
        resultEl.innerHTML = "";
        return;
      }

      var myUnitCost = myTotal / myQty;           // 내 개당 단가
      var profitUnit  = unitPrice - myUnitCost;   // 개당 이득/손해
      var profitTotal = profitUnit * myQty;        // 전체 이득/손해
      var pct         = (profitTotal / myTotal) * 100;
      var isProfit    = profitUnit >= 0;
      var sign        = isProfit ? "+" : "";
      var cls         = isProfit ? "mc3-res-profit" : "mc3-res-loss";

      // 계산식 행
      var formulaLine =
        '<div class="mc3-res-formula">' +
          myQty + '개 × 서버가 ' + mcFmt(unitPrice) + ' − 내 단가 ' + mcFmt(myUnitCost) +
          ' = <strong class="' + (isProfit ? "val-up" : "val-dn") + '">' +
            sign + mcFmt(profitUnit) + ' 카니/개</strong>' +
        '</div>';

      // 총합 행
      var totalLine =
        '<div class="mc3-res-row">' +
          '<span class="mc3-res-label">총 ' + (isProfit ? "이익" : "손해") + '</span>' +
          '<span class="mc3-res-val ' + (isProfit ? "val-up" : "val-dn") + '">' +
            sign + Math.round(profitTotal).toLocaleString("ko-KR") + ' 카니' +
          '</span>' +
          '<span class="mc3-res-pct ' + (isProfit ? "pct-up" : "pct-dn") + '">' +
            sign + pct.toFixed(1) + '%' +
          '</span>' +
        '</div>';

      resultEl.innerHTML =
        '<div class="mc3-result-box ' + cls + '">' +
          formulaLine + totalLine +
        '</div>';
    }

    qtyInput.addEventListener("input", calc);
    priceInput.addEventListener("input", calc);
  });
}

renderSidebar();
setupNotice();
setupBgm();
setupHeaderStars();
renderMarket();
pick("hamburger");
</script>
</body>
</html>
